<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - UniEvents</title>
    <link rel="stylesheet" href="admin.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        .admin-navbar {
            background: #1e1b4b;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .admin-navbar h2 { font-size: 20px; }
        .admin-navbar div { display: flex; align-items: center; gap: 12px; }
        #adminName {
            background: rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .nav-btn {
            border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 13px;
        }
        .btn-back { background: #6366F1; color: white; }
        .btn-logout { background: #EF4444; color: white; }

        /* Layout */
        .admin-layout {
            display: flex;
            gap: 0;
            min-height: calc(100vh - 60px);
        }

        /* Left Panel - Add Event + Event List */
        .left-panel {
            width: 55%;
            padding: 30px;
            border-right: 2px solid #e5e7eb;
            background: #f8fafc;
        }

        /* Right Panel - Attendees */
        .right-panel {
            width: 45%;
            padding: 30px;
            background: white;
        }

        h2.section-title {
            font-size: 18px;
            color: #1e1b4b;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #6366F1;
        }

        /* Add Event Form */
        .add-event-form input {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }
        .add-event-form input:focus {
            outline: none;
            border-color: #6366F1;
        }
        .btn-add {
            background: linear-gradient(90deg, #4F46E5, #7C3AED);
            color: white; border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            margin-top: 4px;
        }

        /* Event Cards */
        .event-card-admin {
            background: white;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-left: 4px solid #6366F1;
        }
        .event-card-admin.completed {
            border-left-color: #9ca3af;
            opacity: 0.8;
        }
        .event-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .event-card-top strong { font-size: 15px; color: #1e1b4b; }
        .badge-upcoming { color: #10B981; font-weight: bold; font-size: 13px; }
        .badge-completed { color: #9ca3af; font-weight: bold; font-size: 13px; }
        .event-meta { font-size: 13px; color: #555; margin-bottom: 10px; }
        .event-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-view { background: #6366F1; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-complete { background: #10B981; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-delete { background: #EF4444; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }

        /* Attendees Panel */
        .attendee-placeholder {
            text-align: center;
            color: #9ca3af;
            padding: 60px 20px;
            font-size: 15px;
        }
        .attendee-placeholder span { font-size: 40px; display: block; margin-bottom: 10px; }

        .attendee-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .attendee-count {
            background: #6366F1;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .attendee-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid #e5e7eb;
        }
        .attendee-card .att-name {
            font-weight: bold;
            color: #1e1b4b;
            font-size: 15px;
            margin-bottom: 8px;
        }
        .att-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .att-item {
            font-size: 12px;
            color: #555;
        }
        .att-item span {
            color: #111;
            font-weight: 600;
        }
        .att-number {
            background: #6366F1;
            color: white;
            width: 22px; height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            margin-right: 6px;
        }

        hr.divider { border: none; border-top: 2px solid #e5e7eb; margin: 24px 0; }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="admin-navbar">
    <h2>🎓 UniEvents Admin Panel</h2>
    <div>
        <span id="adminName"></span>
        <button class="nav-btn btn-back" onclick="location.href='index.html'">← Back to Site</button>
        <button class="nav-btn btn-logout" onclick="logout()">Logout</button>
    </div>
</div>

<!-- Main Layout -->
<div class="admin-layout">

    <!-- LEFT: Add Event + Event List -->
    <div class="left-panel">

        <!-- Add Event -->
        <h2 class="section-title">➕ Add New Event</h2>
        <div class="add-event-form">
            <input type="text" id="eventName" placeholder="Event Name *">
            <input type="date" id="eventDate">
            <input type="text" id="eventLocation" placeholder="Location *">
            <input type="text" id="eventImage" placeholder="Image URL (optional)">
            <button class="btn-add" onclick="addEvent()">➕ Add Event</button>
        </div>

        <hr class="divider">

        <!-- Event List -->
        <h2 class="section-title">📋 All Events</h2>
        <div id="adminEventList">
            <p style="color:#888;">Loading events...</p>
        </div>

    </div>

    <!-- RIGHT: Attendees -->
    <div class="right-panel">
        <h2 class="section-title">👥 Attendees</h2>
        <div id="attendeesPanel">
            <div class="attendee-placeholder">
                <span>👆</span>
                Click "View Attendees" on any event to see registrations here
            </div>
        </div>
    </div>

</div>

<script src="api.js"></script>
<script src="session.js"></script>
<script src="admin.js"></script>
</body>
</html>
